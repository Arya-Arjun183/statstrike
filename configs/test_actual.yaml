data:
  csv_path: data/raw/premier/epl-xg-data2014-25.csv
  target_type: dixon_coles_actual

features:
  include_rest_days: true
  include_xg_proxy: false
  include_elo: false
  include_multi_window: true
  include_discipline: false
  include_fixture_congestion: true
  include_halftime: false
  include_opponent_adj: false

training:
  algorithm: dixon_coles_actual
  walk_forward: true
  holdout_season: 2024-2025
  season_decay_rate: 0.9

output:
  model_path: models/dixon_coles_actual.pkl
