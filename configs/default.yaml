data:
  csv_glob: data/raw/*.csv
  date_column: Date
  target_column: FTR

features:
  include_rest_days: true
  include_xg_proxy: true
  include_elo: true
  include_multi_window: true
  include_discipline: true
  include_odds_movement: true
  include_multi_bookmaker: true
  include_fixture_congestion: true
  include_halftime: true
  include_opponent_adj: true

training:
  test_size: 0.2
  random_state: 42
  split_strategy: chronological  # options: chronological, random
  algorithm: logistic_regression  # options: logistic_regression, logistic_regression_balanced, random_forest, hist_gradient_boosting, two_stage_draw_model, catboost, stacking_ensemble, soft_voting_ensemble
  calibrate: false
  walk_forward: false
  season_decay_rate: 1.0  # Weight multiplier per season back in time
  tuning:
    validation_fraction: 0.2
    metric: accuracy  # options: accuracy, draw_f1, hybrid

output:
  model_path: models/premier_league_model.joblib
